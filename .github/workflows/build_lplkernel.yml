name: Build LplKernel CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches-ignore: [ "ga-ignore-**", "gh-pages" ]
    paths:
      - '**.c'
      - '**.h'
      - '**.cpp'
      - '**.hpp'
      - '**.in'
      - '**.inl'
      - '**.sh'
      - '**/build_lplkernel.yml'

jobs:
  build_lplkernel:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Cache downloaded toolchain sources
      uses: actions/cache@v5
      with:
        path: |
          ~/src
        key: ${{ runner.os }}-lplkernel-src-v1

    - name: Restore toolchain cache
      uses: actions/cache@v5
      with:
        path: /usr/local/i686-elf
        key: ${{ runner.os }}-lplkernel-toolchain-v1

    - name: Install dependencies and build cross-toolchain (if not cached)
      run: |
        set -e
        if [ -x /usr/local/i686-elf/bin/i686-elf-gcc ]; then
          echo "Cross toolchain already installed — skipping build"
          echo "PATH=/usr/local/i686-elf/bin:$PATH" >> $GITHUB_ENV
          i686-elf-gcc --version || true
          exit 0
        fi

        sudo apt-get update
        sudo apt-get install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo wget make ninja-build

        mkdir -p ~/src
        cd ~/src
        if [ ! -d binutils-2.36 ]; then
          wget -q http://ftp.gnu.org/gnu/binutils/binutils-2.36.tar.gz
          tar -xzf binutils-2.36.tar.gz
        else
          echo "binutils sources cached"
        fi
        if [ ! -d gcc-10.2.0 ]; then
          wget -q http://ftp.gnu.org/gnu/gcc/gcc-10.2.0/gcc-10.2.0.tar.gz
          tar -xzf gcc-10.2.0.tar.gz
        else
          echo "gcc sources cached"
        fi

        mkdir -p build-binutils
        cd build-binutils
        ../binutils-2.36/configure --target=i686-elf --prefix=/usr/local/i686-elf --disable-nls --disable-werror
        make -j$(nproc)
        sudo make install

        mkdir -p ../build-gcc
        cd ../build-gcc
        ../gcc-10.2.0/configure --target=i686-elf --prefix=/usr/local/i686-elf --disable-nls --enable-languages=c,c++ --without-headers
        make -j$(nproc) all-gcc all-target-libgcc
        sudo make install-gcc
        sudo make install-target-libgcc

        echo "PATH=/usr/local/i686-elf/bin:$PATH" >> $GITHUB_ENV
        i686-elf-gcc --version || true

        sudo mkdir -p /usr/local/i686-elf/.cache_marker || true
        sudo touch /usr/local/i686-elf/.cache_marker || true

    - name: Ensure host build tools
      run: |
        set -e
        echo "Runner: $(uname -a)"
        echo "PATH=$PATH"

        need_install=false
        for cmd in make grep; do
          if ! command -v "$cmd" >/dev/null 2>&1; then
            need_install=true
          fi
        done

        if [ "$need_install" = true ]; then
          echo "Missing required commands; attempting to install..."

          PM=""
          UPDATE_CMD=""
          INSTALL_CMD=""
          if command -v apt-get >/dev/null 2>&1; then
            PM="apt-get"
            UPDATE_CMD="update"
            INSTALL_CMD="install -y --no-install-recommends make grep"
          elif command -v yum >/dev/null 2>&1; then
            PM="yum"
            UPDATE_CMD="makecache"
            INSTALL_CMD="install -y make grep"
          elif command -v dnf >/dev/null 2>&1; then
            PM="dnf"
            UPDATE_CMD="makecache"
            INSTALL_CMD="install -y make grep"
          elif command -v apk >/dev/null 2>&1; then
            PM="apk"
            UPDATE_CMD=""
            INSTALL_CMD="add --no-cache make grep"
          else
            echo "No supported package manager found (apt-get, yum, dnf, apk). Skipping installation.\nPlease run this job on an image with a package manager or preinstall required tools." >&2
            exit 0
          fi

          SUDO_CMD=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO_CMD="sudo"
          fi

          echo "Detected package manager: $PM"
          if [ -n "$UPDATE_CMD" ]; then
            $SUDO_CMD $PM $UPDATE_CMD
          fi
          $SUDO_CMD $PM $INSTALL_CMD
        fi

        make --version || true
        grep --version || true

    - name: Build ISO
      run: |
        set -e
        ./clean.sh
        ./iso.sh

    - name: Check if build succeeded
      run: |
        set -e
        if [ ! -f lpl.iso ]; then
          echo "ISO not found - build failed"
          exit 1
        fi
