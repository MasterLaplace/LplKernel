name: Build LplKernel CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Cache downloaded toolchain sources
      uses: actions/cache@v5
      with:
        path: |
          ~/src
        key: ${{ runner.os }}-lplkernel-src-v1

    - name: Install dependencies and build cross-toolchain (if not cached)
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo wget make ninja-build

        mkdir -p ~/src
        cd ~/src
        if [ ! -d binutils-2.36 ]; then
          wget -q http://ftp.gnu.org/gnu/binutils/binutils-2.36.tar.gz
          tar -xzf binutils-2.36.tar.gz
        else
          echo "binutils sources cached"
        fi
        if [ ! -d gcc-10.2.0 ]; then
          wget -q http://ftp.gnu.org/gnu/gcc/gcc-10.2.0/gcc-10.2.0.tar.gz
          tar -xzf gcc-10.2.0.tar.gz
        else
          echo "gcc sources cached"
        fi

        mkdir -p build-binutils
        cd build-binutils
        ../binutils-2.36/configure --target=i686-elf --prefix=/usr/local/i686-elf --disable-nls --disable-werror
        make -j$(nproc)
        sudo make install

        mkdir -p ../build-gcc
        cd ../build-gcc
        ../gcc-10.2.0/configure --target=i686-elf --prefix=/usr/local/i686-elf --disable-nls --enable-languages=c,c++ --without-headers
        make -j$(nproc) all-gcc all-target-libgcc
        sudo make install-gcc
        sudo make install-target-libgcc

        echo 'PATH=/usr/local/i686-elf/bin:$PATH' >> $GITHUB_ENV

    - name: Build ISO
      run: |
        set -e
        ./clean.sh
        ./iso.sh

    - name: Check if build succeeded
      run: |
        set -e
        if [ ! -f lpl.iso ]; then
          echo "ISO not found - build failed"
          exit 1
        fi
