name: Deploy Portfolio

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # push the built site to the gh-pages branch

jobs:
  deploy:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      # --- Cross-toolchain (GCC 14 — LplPlugin/libengine require -std=gnu++23) ---
      # Distinct cache keys from build_lplkernel.yml's GCC 10 toolchain so the two
      # never clobber each other.
      - name: Cache downloaded toolchain sources
        uses: actions/cache@v5
        with:
          path: ~/src
          key: ${{ runner.os }}-lplkernel-src-gcc14-v3

      - name: Restore toolchain cache
        uses: actions/cache@v5
        with:
          path: ~/i686-elf
          key: ${{ runner.os }}-lplkernel-toolchain-gcc14-v3

      - name: Install deps and build cross-toolchain (if not cached)
        run: |
          set -e
          if [ -x "$HOME/i686-elf/bin/i686-elf-gcc" ]; then
            echo "Cross toolchain already installed — skipping build"
            echo "PATH=$HOME/i686-elf/bin:$PATH" >> $GITHUB_ENV
            i686-elf-g++ --version | head -1
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev \
            texinfo wget make ninja-build xorriso grub-pc-bin mtools dosfstools

          BINUTILS=binutils-2.42
          GCC=gcc-14.2.0
          mkdir -p ~/src && cd ~/src
          [ -d "$BINUTILS" ] || { wget -q "http://ftp.gnu.org/gnu/binutils/${BINUTILS}.tar.gz" && tar -xzf "${BINUTILS}.tar.gz"; }
          [ -d "$GCC" ]      || { wget -q "http://ftp.gnu.org/gnu/gcc/${GCC}/${GCC}.tar.gz" && tar -xzf "${GCC}.tar.gz"; }

          # GCC needs gmp/mpfr/mpc; download_prerequisites vendors matching versions.
          # Guarded so a cached $GCC source tree isn't re-vendored (it would error).
          [ -e "$GCC/gmp" ] || (cd "$GCC" && ./contrib/download_prerequisites)

          # Always build in fresh dirs: a cached ~/src can hold a config.cache from a
          # previous prefix, and GCC's configure aborts on "CC has changed".
          rm -rf build-binutils build-gcc
          mkdir -p build-binutils && cd build-binutils
          "../${BINUTILS}/configure" --target=i686-elf --prefix="$HOME/i686-elf" --disable-nls --disable-werror
          make -j"$(nproc)" && make install

          mkdir -p ../build-gcc && cd ../build-gcc
          # Mirror the local cross toolchain exactly: freestanding libstdc++
          # (--disable-hosted-libstdcxx) provides <cstddef>, <cstdint>, etc.
          "../${GCC}/configure" --target=i686-elf --prefix="$HOME/i686-elf" \
            --disable-nls --enable-languages=c,c++ --without-headers \
            --disable-libssp --disable-libquadmath --disable-libcc1 --disable-hosted-libstdcxx
          # MAKEINFO=true avoids doc-build failures on runners without a usable makeinfo.
          make -j"$(nproc)" all-gcc all-target-libgcc all-target-libstdc++-v3 MAKEINFO=true
          make install-gcc install-target-libgcc install-target-libstdc++-v3 MAKEINFO=true
          echo "PATH=$HOME/i686-elf/bin:$PATH" >> $GITHUB_ENV
          "$HOME/i686-elf/bin/i686-elf-g++" --version | head -1

      - name: Ensure ISO host tools
        run: sudo apt-get update && sudo apt-get install -y xorriso grub-pc-bin mtools dosfstools

      # --- Build both kernel ISOs ---
      - name: Build ISOs (client + server)
        run: |
          set -e
          ./pipeline_profiles.sh
          test -f lpl-client.iso
          test -f lpl-server.iso

      # --- Build the Astro site ---
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build site
        working-directory: site
        run: |
          set -e
          npm ci || npm install
          npm run fetch-v86
          npm run build
          mkdir -p dist/isos
          cp ../lpl-client.iso dist/isos/lpl-client.iso
          cp ../lpl-server.iso dist/isos/lpl-server.iso
          # SPA/relative-path safety + disable Jekyll on Pages
          touch dist/.nojekyll

      # --- Publish to gh-pages (never touches main) ---
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: portfolio site from ${{ github.sha }}"
